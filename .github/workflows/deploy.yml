name: Deploy Web App

on:
  # Allow manual trigger for on-demand deployment
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - production
          - dev
          - test
      tag:
        description: "Docker image tag (leave empty for auto-generated tag)"
        required: false
        default: ""
      build_arm64:
        description: "Build ARM64 image (slows down build)"
        required: false
        default: false
        type: boolean
      comment-id: # ← passed automatically by slash-command-dispatch
        required: false
      repository: # ← also passed automatically
        required: false

  # Run daily at midnight for dev builds
  schedule:
    - cron: "0 0 * * *"

  # Trigger on release/1.4.0 branch for dev release
  push:
    branches:
      - "release/1.4.0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'schedule' || github.ref == 'refs/heads/release/1.4.0') && 'dev' || inputs.environment || 'production' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine Environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ] || [ "$GH_REF" == "refs/heads/release/1.4.0" ]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=$INPUT_ENVIRONMENT" >> $GITHUB_ENV
            echo "environment=$INPUT_ENVIRONMENT" >> $GITHUB_OUTPUT
          fi

          # Normalize repository name to lowercase and strip owner for Docker Hub
          REPO_NAME="$REPOSITORY"
          # Get the part after the slash (repo name only)
          REPO_SHOULD_BE_NAME="${REPO_NAME##*/}"
          # Lowercase
          REPO_NAME_LC=$(echo "$REPO_SHOULD_BE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV

      - name: Set up QEMU
        if: env.ENVIRONMENT == 'production' && inputs.build_arm64 == true
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            doezer/${{ env.REPO_NAME_LC }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ env.ENVIRONMENT == 'production' }}
            type=raw,value=dev,enable=${{ env.ENVIRONMENT == 'dev' }}
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short,enable=${{ env.ENVIRONMENT != 'dev' }}
          labels: |
            org.opencontainers.image.title=Questarr
            org.opencontainers.image.description=A video game management application inspired by the -Arr apps. Track and organize your video game collection with automated discovery and download management.
            org.opencontainers.image.vendor=Doezer

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ (env.ENVIRONMENT == 'production' && inputs.build_arm64 == true) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Deployment summary
        id: summary
        run: |
          TAG="latest"
          if [ "${{ env.ENVIRONMENT }}" == "dev" ]; then
            TAG="dev"
          fi

          SUMMARY=$(cat << EOF
          ## Deployment Summary

          - **Environment:** ${{ env.ENVIRONMENT }}
          - **Image:** ghcr.io/${{ github.repository }}
          - **Docker Hub:** doezer/${{ env.REPO_NAME_LC }}
          - **Tags:** ${{ steps.meta.outputs.tags }}

          ### Pull and run the image:
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:\$TAG
          docker run -d -p 5000:5000 \\
            -e POSTGRES_PASSWORD=your_password \\
            -e IGDB_CLIENT_ID=your_client_id \\
            -e IGDB_CLIENT_SECRET=your_client_secret \\
            ghcr.io/${{ github.repository }}:\$TAG
          \`\`\`
          EOF
          )

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post result to PR
        if: always() && inputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.PAT }}
          repository: ${{ inputs.repository }}
          comment-id: ${{ inputs.comment-id }}
          body: ${{ steps.summary.outputs.content }}
