name: Slash Command Dispatch
on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Parse and dispatch slash command
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const body = context.payload.comment.body.trim();
            if (!body.startsWith('/deploy')) return;

            // Check admin permission
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (perm.permission !== 'admin') {
              console.log(`User ${context.payload.comment.user.login} lacks admin permission`);
              return;
            }

            // Add rocket reaction (best-effort — requires issues scope on PAT)
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            } catch (e) {
              console.log(`Could not add reaction: ${e.message}`);
            }

            // Get PR head branch
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Parse named args: /deploy environment=production tag=v1.0 build_arm64=true
            const args = {};
            body.split(/\s+/).slice(1).forEach(part => {
              const [k, ...rest] = part.split('=');
              if (k && rest.length) args[k] = rest.join('=');
            });

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: pr.head.ref,
              inputs: {
                environment: args.environment || 'test',
                tag: args.tag || '',
                build_arm64: args.build_arm64 || 'false',
                'comment-id': String(context.payload.comment.id),
                repository: `${context.repo.owner}/${context.repo.repo}`,
              },
            });
