name: Slash Command Dispatch
on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/slash-command-dispatch@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.PAT }}
          commands: deploy
          dispatch-type: workflow
          reaction: rocket
          permission: admin
