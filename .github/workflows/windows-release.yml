name: Windows Installer Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Leave empty to use package.json version."
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows x64 installer
    runs-on: windows-latest
    if: ${{ github.event_name != 'release' || github.actor != 'github-actions[bot]' }}

    env:
      NODE_VERSION: 22.x
      DOTNET_VERSION: 8.0.x
      INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
      PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease) || (github.event_name == 'release' && github.event.release.prerelease) || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')) || false }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Build project
        run: npm run build

      - name: Publish Windows service host
        shell: pwsh
        run: |
          dotnet publish installer/windows/Questarr.Service/Questarr.Service.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            --output release/service

      - name: Prune development dependencies
        run: npm prune --omit=dev

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:INPUT_TAG
          $autoIncrementTag = $false
          $existingReleaseTags = @(gh release list --repo $repo --limit 1000 --json tagName --jq ".[].tagName")
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list existing GitHub releases"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
              $tag = $env:RELEASE_TAG
            } elseif ($env:GITHUB_REF_TYPE -eq "tag") {
              $tag = $env:GITHUB_REF_NAME
            } else {
              $tag = "v$($packageJson.version)"
              $autoIncrementTag = $true
            }
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          function Test-GitTagExists {
            param([Parameter(Mandatory = $true)][string] $Candidate)

            $tagRef = git ls-remote --tags origin "refs/tags/$Candidate"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to check whether git tag $Candidate exists"
            }

            return -not [string]::IsNullOrWhiteSpace($tagRef)
          }

          function Test-ReleaseExists {
            param([Parameter(Mandatory = $true)][string] $Candidate)

            return $existingReleaseTags -contains $Candidate
          }

          function Test-ReleaseTagExists {
            param([Parameter(Mandatory = $true)][string] $Candidate)

            return (Test-GitTagExists $Candidate) -or (Test-ReleaseExists $Candidate)
          }

          function Get-NextPatchTag {
            param([Parameter(Mandatory = $true)][string] $BaseTag)

            $version = $BaseTag.TrimStart("v")
            if ($version -notmatch "^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$") {
              throw "Cannot auto-increment non-semver release tag '$BaseTag'. Provide an explicit workflow tag."
            }

            $major = [int]$Matches.major
            $minor = [int]$Matches.minor
            $patch = [int]$Matches.patch

            do {
              $candidate = "v$major.$minor.$patch"
              $patch++
            } while (Test-ReleaseTagExists $candidate)

            return $candidate
          }

          if ($autoIncrementTag) {
            $tag = Get-NextPatchTag $tag
          }

          $version = $tag.TrimStart("v")
          $artifact = "QuestarrSetup-$version-windows-x64.exe"

          Write-Host "Resolved Windows release tag: $tag"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT

      - name: Prepare installer payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $payloadRoot = Join-Path "release" "payload"
          $binDir = Join-Path $payloadRoot "bin"

          New-Item -ItemType Directory -Force -Path $payloadRoot, $binDir | Out-Null
          Copy-Item -Path dist, migrations, node_modules -Destination $payloadRoot -Recurse
          Copy-Item -Path package.json, package-lock.json, README.md, COPYING -Destination $payloadRoot
          Copy-Item -Path installer/windows/README.txt -Destination (Join-Path $payloadRoot "README-WINDOWS.txt")
          Copy-Item -Path release/service/Questarr.Service.exe -Destination (Join-Path $payloadRoot "Questarr.Service.exe")

          if (Test-Path docs) {
            Copy-Item -Path docs -Destination $payloadRoot -Recurse
          }

          $nodePath = (Get-Command node).Source
          Copy-Item -Path $nodePath -Destination (Join-Path $binDir "node.exe")

          $payloadRootPath = (Get-Item -LiteralPath $payloadRoot).FullName
          $manifestPath = Join-Path $payloadRootPath "questarr-install-manifest.json"
          $includePath = Join-Path "release" "questarr-files.iss"

          function ConvertTo-InnoString {
            param([Parameter(Mandatory = $true)][string] $Value)
            return $Value.Replace('"', '""')
          }

          function ConvertTo-InnoSingleQuotedString {
            param([Parameter(Mandatory = $true)][string] $Value)
            return $Value.Replace("'", "''")
          }

          $payloadRootPrefix = $payloadRootPath.TrimEnd('\') + '\'
          $payloadFiles = Get-ChildItem -LiteralPath $payloadRootPath -Recurse -File |
            Where-Object { $_.FullName -ne $manifestPath } |
            Sort-Object FullName

          $manifestFiles = foreach ($file in $payloadFiles) {
            if (-not $file.FullName.StartsWith($payloadRootPrefix, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "Payload file is outside the payload root: $($file.FullName)"
            }

            $relativePath = $file.FullName.Substring($payloadRootPrefix.Length).Replace('\', '/')
            [ordered]@{
              path = $relativePath
              size = $file.Length
              sha256 = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }

          [ordered]@{
            version = "${{ steps.meta.outputs.version }}"
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
            files = @($manifestFiles)
          } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $manifestPath -Encoding utf8

          $includeLines = foreach ($entry in $manifestFiles) {
            $relativeWindowsPath = $entry.path.Replace('/', '\')
            $sourcePath = Join-Path $payloadRootPath $relativeWindowsPath
            $relativeDir = Split-Path $relativeWindowsPath -Parent
            $destDir = if ([string]::IsNullOrWhiteSpace($relativeDir)) {
              "{app}"
            } else {
              "{app}\$relativeDir"
            }

            'Source: "' + (ConvertTo-InnoString $sourcePath) + '"; DestDir: "' + (ConvertTo-InnoString $destDir) + '"; Flags: ignoreversion createallsubdirs; Check: ShouldInstallPayloadFile(''' + (ConvertTo-InnoSingleQuotedString $entry.path) + ''')'
          }

          $includeLines | Set-Content -LiteralPath $includePath -Encoding utf8

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installerOutput = Join-Path "release" "installer"
          New-Item -ItemType Directory -Force -Path $installerOutput | Out-Null

          $env:QUESTARR_VERSION = "${{ steps.meta.outputs.version }}"
          $env:QUESTARR_SOURCE_DIR = (Resolve-Path (Join-Path "release" "payload")).Path
          $env:QUESTARR_OUTPUT_DIR = (Resolve-Path $installerOutput).Path
          $env:QUESTARR_FILES_INCLUDE = (Resolve-Path (Join-Path "release" "questarr-files.iss")).Path

          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          & $iscc installer/windows/Questarr.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }

      - name: Validate installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installerPath = Join-Path "release/installer" "${{ steps.meta.outputs.artifact }}"
          if (-not (Test-Path $installerPath)) {
            throw "Missing installer: $installerPath"
          }

          $installer = Get-Item $installerPath
          if ($installer.Length -lt 10MB) {
            throw "Installer looks too small: $($installer.Length) bytes"
          }

          $requiredPaths = @(
            "release/payload/bin/node.exe",
            "release/payload/Questarr.Service.exe",
            "release/payload/dist/server/index.js",
            "release/payload/migrations/meta/_journal.json",
            "release/payload/node_modules/better-sqlite3",
            "release/payload/README-WINDOWS.txt",
            "release/payload/questarr-install-manifest.json",
            "release/questarr-files.iss"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Missing installer payload file: $path"
            }
          }

          & release/payload/bin/node.exe --check release/payload/dist/server/index.js

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuestarrSetup-${{ steps.meta.outputs.version }}-windows-x64
          path: release/installer/${{ steps.meta.outputs.artifact }}
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ steps.meta.outputs.tag }}"
          $installerPath = Join-Path "release/installer" "${{ steps.meta.outputs.artifact }}"
          $notesPath = Join-Path "release" "windows-release-notes.md"
          $repo = $env:GITHUB_REPOSITORY

          @(
            "Questarr Windows x64 installer.",
            "",
            "Installs Questarr as a Windows service, starts it automatically, adds an inbound Windows Firewall rule for the bundled runtime, and stores runtime data under C:\ProgramData\Questarr."
          ) | Set-Content -Path $notesPath -Encoding utf8

          $existingReleaseTags = @(gh release list --repo $repo --limit 1000 --json tagName --jq ".[].tagName")
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list existing GitHub releases"
          }
          $releaseExists = $existingReleaseTags -contains $tag

          if ($releaseExists) {
            $editArgs = @(
              "release",
              "edit",
              $tag,
              "--repo",
              $repo,
              "--title",
              "Questarr $tag",
              "--notes-file",
              $notesPath
            )

            if ($env:PRERELEASE -eq "true") {
              $editArgs += "--prerelease"
            }

            & gh @editArgs
            gh release upload $tag $installerPath --repo $repo --clobber
          } else {
            $args = @(
              "release",
              "create",
              $tag,
              $installerPath,
              "--repo",
              $repo,
              "--target",
              $env:GITHUB_SHA,
              "--title",
              "Questarr $tag",
              "--notes-file",
              $notesPath
            )

            if ($env:PRERELEASE -eq "true") {
              $args += "--prerelease"
            }

            & gh @args
          }
