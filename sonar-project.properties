sonar.sources=client/src,server,shared
sonar.tests=server/__tests__,client/__tests__,tests,playwright
sonar.sourceEncoding=UTF-8

sonar.typescript.tsconfigPath=tsconfig.json

sonar.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,tests/**,playwright/**
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,tests/**,playwright/**
sonar.cpd.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,migrations/**,playwright/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Suppress all issues (including security hotspots) on test files
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
